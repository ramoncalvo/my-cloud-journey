<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Multi-cloud SSO Lab{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #0b5fff; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; background: #eef2ff; color: #3730a3; }
    .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; background: #111; color: #fff; text-decoration: none; }
    .btn.logout { background: #b91c1c; }
    pre { background: #f6f6f6; padding: 1rem; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <header>
    <a href="/"><strong>Multi-cloud SSO Lab</strong></a>
    <nav>
      <a href="/aws">AWS</a>
      <a href="/azure">Azure</a>
      <a href="/gcp">GCP</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
