services:
  python:
    build: ./python
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8000

  nestjs:
    build: ./nestjs
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8003

  express:
    build: ./express
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8004

  php:
    build: ./php
    ports:
      - "8006:8006"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8006
