services:
  python:
    build: ./python
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8000

  nestjs:
    build: ./nestjs
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8003

  go:
    build: ./go
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      - BASE_URL=http://localhost:8005
