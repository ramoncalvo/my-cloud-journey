server:
  port: 8080

spring:
  security:
    oauth2:
      client:
        registration:
          # Nombre del registration = registrationId. Spring Security lo usa
          # para construir las URLs por defecto: login en
          # /oauth2/authorization/{registrationId}, callback en
          # /login/oauth2/code/{registrationId}.
          # Spring valida al arrancar que client-id/client-secret no esten
          # vacios (a diferencia de Python/C#, que solo fallan al intentar
          # el login). Por eso el fallback es "unset" y no cadena vacia:
          # asi la app arranca igual sin credenciales, y solo falla al
          # pulsar login en una nube todavia no configurada.
          # redirect-uri explicito: para providers "conocidos" por nombre
          # (ej. google) Spring aplicaria este mismo template solo, pero al
          # sobreescribir el provider (ver mas abajo) hay que darlo a mano.
          aws:
            client-id: ${AWS_COGNITO_CLIENT_ID:unset}
            client-secret: ${AWS_COGNITO_CLIENT_SECRET:unset}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,email,profile
          azure:
            client-id: ${AZURE_CLIENT_ID:unset}
            client-secret: ${AZURE_CLIENT_SECRET:unset}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,email,profile
          google:
            client-id: ${GOOGLE_CLIENT_ID:unset}
            client-secret: ${GOOGLE_CLIENT_SECRET:unset}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,email,profile
        provider:
          # A diferencia de Python (Authlib) y C# (OpenIdConnect handler),
          # que resuelven el documento de descubrimiento (issuer-uri) de
          # forma perezosa (solo al primer login real), Spring Boot lo
          # resuelve de forma EAGER al arrancar la app como parte de crear
          # el ClientRegistrationRepository. Si el tenant/credenciales
          # todavia no estan configurados, esa llamada de red falla y la
          # app entera no arranca. Para evitarlo, los 3 proveedores usan
          # endpoints fijos a mano (nada de issuer-uri), igual de eager-free
          # que las otras 2 implementaciones.
          aws:
            authorization-uri: ${AWS_COGNITO_DOMAIN:}/oauth2/authorize
            token-uri: ${AWS_COGNITO_DOMAIN:}/oauth2/token
            user-info-uri: ${AWS_COGNITO_DOMAIN:}/oauth2/userInfo
            # "sub" es el unico claim que Cognito garantiza siempre en userInfo.
            user-name-attribute: sub
          azure:
            authorization-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:common}/discovery/v2.0/keys
            user-name-attribute: sub
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub
